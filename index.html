<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrusel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .carousel {
      position: relative;
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 12px;
      background: #f0f0f0;
    }

    .track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }

    .slide {
      min-width: 100%;
      height: 100%;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      z-index: 10;
      transition: transform 0.15s, background 0.15s;
    }
    .arrow:hover { background: #fff; transform: translateY(-50%) scale(1.08); }
    .arrow.left  { left: 10px; }
    .arrow.right { right: 10px; }
    .arrow.hidden { display: none; }

    .dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.5;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .dot.active { opacity: 1; transform: scale(1.25); }
  </style>
</head>
<body>

<div class="carousel">
  <div class="track" id="track">
    <div class="slide"><img src="foto1.jpg"  alt="Foto 1"></div>
    <div class="slide"><img src="foto2.jpg"  alt="Foto 2"></div>
    <div class="slide"><img src="foto3.jpg"  alt="Foto 3"></div>
    <div class="slide"><img src="foto4.jpg"  alt="Foto 4"></div>
    <div class="slide"><img src="foto5.jpg"  alt="Foto 5"></div>
    <div class="slide"><img src="foto6.jpg"  alt="Foto 6"></div>
    <div class="slide"><img src="foto7.jpg"  alt="Foto 7"></div>
    <div class="slide"><img src="foto8.jpg"  alt="Foto 8"></div>
    <div class="slide"><img src="foto9.jpg"  alt="Foto 9"></div>
    <div class="slide"><img src="foto10.jpg" alt="Foto 10"></div>
    <div class="slide"><img src="foto11.jpg" alt="Foto 11"></div>
    <div class="slide"><img src="foto12.jpg" alt="Foto 12"></div>
  </div>

  <button class="arrow left hidden" id="btnPrev" aria-label="Anterior">&#8249;</button>
  <button class="arrow right"       id="btnNext" aria-label="Siguiente">&#8250;</button>

  <div class="dots" id="dots"></div>
</div>

<script>
  const track   = document.getElementById('track');
  const dotsEl  = document.getElementById('dots');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const slides  = track.querySelectorAll('.slide');
  const total   = slides.length;
  let current   = 0;

  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });

  function goTo(index) {
    current = (index + total) % total;
    track.style.transform = `translateX(-${current * 100}%)`;
    dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    btnPrev.classList.toggle('hidden', current === 0);
    btnNext.classList.toggle('hidden', current === total - 1);
  }

  btnPrev.addEventListener('click', () => goTo(current - 1));
  btnNext.addEventListener('click', () => goTo(current + 1));

  let startX = 0;
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend',   e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
  });

  let dragging = false, dragStartX = 0;
  track.addEventListener('mousedown', e => { dragging = true; dragStartX = e.clientX; });
  track.addEventListener('mouseup',   e => {
    if (!dragging) return; dragging = false;
    const diff = dragStartX - e.clientX;
    if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
  });
  track.addEventListener('mouseleave', () => { dragging = false; });

  goTo(0);
</script>

</body>
</html>
